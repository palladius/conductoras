<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git History Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #0ff;
            font-family: 'Share Tech Mono', monospace;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .hud {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        .hud-top {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-family: 'Press Start 2P', cursive;
            text-shadow: 0 0 10px #0ff;
            font-size: 14px;
        }

        .hud-bottom {
            bottom: 20px;
            left: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #0ff;
            box-shadow: 0 0 15px #0ff, inset 0 0 10px #0ff;
            border-radius: 8px;
            padding: 15px;
        }
        
        .retro-text {
            text-shadow: 0 0 5px #f0f, 0 0 10px #f0f;
            color: #f0f;
        }

        .btn {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 5px 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 5px #0ff;
            box-shadow: 0 0 5px #0ff inset;
        }
        
        .btn:hover {
            background: #0ff;
            color: #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="hud hud-top">
        <div class="flex gap-6">
            <div>SCORE: <span id="scoreDisplay">000000</span></div>
            <div>PLAYERS: <span id="playersDisplay">0</span></div>
            <div>TRACKS: <span id="tracksDisplay">0</span></div>
            <div>COMMITS: <span id="commitsDisplay">0</span></div>
        </div>
        <div class="text-center retro-text">GIT HISTORY ARCADE</div>
        <div></div>
    </div>

    <div class="hud hud-bottom flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <select id="repoSelect" class="bg-gray-900 border 2px solid #0ff text-[#0ff] p-2 rounded" style="outline: none; box-shadow: 0 0 5px #0ff;">
                    <option>Loading repos...</option>
                </select>
                <button id="btnPlay" class="btn">PLAY</button>
                <button id="btnPause" class="btn">PAUSE</button>
                <button id="btnReset" class="btn text-red-400 border-red-400 shadow-[0_0_5px_#f00_inset] hover:bg-red-400">RESET</button>
            </div>
            <div id="dateDisplay" class="text-xl font-bold retro-text">1970-01-01</div>
            <div class="flex items-center gap-2">
                <span>SPEED:</span>
                <input type="range" id="speedSlider" min="1" max="100" value="10" class="w-32">
                <span id="speedDisplay">10x</span>
            </div>
        </div>
        <div class="w-full bg-gray-900 h-2 rounded-full overflow-hidden border border-cyan-900">
            <div id="progressBar" class="bg-cyan-400 h-full w-0 shadow-[0_0_10px_#0ff]"></div>
        </div>
    </div>

    <div id="briefingOverlay" class="absolute inset-0 z-20 flex items-center justify-center bg-black/85 backdrop-blur-sm pointer-events-auto transition-opacity duration-300 hidden">
        <div class="max-w-2xl w-full mx-4 bg-gray-950/90 border-4 border-[#0ff] shadow-[0_0_30px_#0ff] rounded-lg p-6 max-h-[85vh] overflow-y-auto flex flex-col font-mono">
            <h2 class="text-3xl text-center retro-text font-bold mb-4 tracking-wider" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 10px #f0f;">MISSION BRIEFING</h2>
            <div id="briefingRepoName" class="text-xl text-[#0ff] text-center mb-6 font-bold uppercase border-b-2 border-dashed border-[#0ff]/40 pb-2">REPO: </div>
            
            <div class="grid grid-cols-3 gap-4 text-lg mb-6">
                <div class="bg-cyan-950/30 border border-[#0ff]/30 p-3 rounded flex flex-col items-center">
                    <span class="text-gray-400 text-[10px] uppercase">COMMITS</span>
                    <span id="briefingCommits" class="text-[#0ff] text-2xl font-extrabold tracking-widest mt-1">0</span>
                </div>
                <div class="bg-cyan-950/30 border border-[#0ff]/30 p-3 rounded flex flex-col items-center">
                    <span class="text-gray-400 text-[10px] uppercase">PLAYERS</span>
                    <span id="briefingPlayers" class="text-[#0ff] text-2xl font-extrabold tracking-widest mt-1">0</span>
                </div>
                <div class="bg-cyan-950/30 border border-[#0ff]/30 p-3 rounded flex flex-col items-center">
                    <span class="text-gray-400 text-[10px] uppercase">TRACKS</span>
                    <span id="briefingTracks" class="text-[#0ff] text-2xl font-extrabold tracking-widest mt-1">0</span>
                </div>
            </div>

            <h3 class="text-lg text-cyan-400 font-bold mb-3 border-b border-[#0ff]/20 pb-1 flex items-center gap-2">
                <span>🛸</span> FLEET DEPLOYMENT (BRANCHES & PLAYERS)
            </h3>
            
            <div id="briefingFleetList" class="flex flex-col gap-3 mb-6 overflow-y-auto pr-2 max-h-[35vh]">
                <!-- Dynamic fleet rows go here -->
            </div>

            <div class="mt-auto flex justify-center">
                <button id="btnStartBriefing" class="btn text-xl px-12 py-3 bg-[#0ff]/20 text-[#0ff] font-extrabold hover:bg-[#0ff] hover:text-[#000] transition-all duration-300 shadow-[0_0_15px_#0ff] animate-pulse" style="font-family: 'Press Start 2P', cursive;">
                    LAUNCH MISSION
                </button>
            </div>
        </div>
    </div>

    <script src="engine.js?v=12"></script>
</body>
</html>
