<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git History Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #0ff;
            font-family: 'Share Tech Mono', monospace;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .hud {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        .hud-top {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-family: 'Press Start 2P', cursive;
            text-shadow: 0 0 10px #0ff;
            font-size: 14px;
        }

        .hud-bottom {
            bottom: 20px;
            left: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #0ff;
            box-shadow: 0 0 15px #0ff, inset 0 0 10px #0ff;
            border-radius: 8px;
            padding: 15px;
        }
        
        .retro-text {
            text-shadow: 0 0 5px #f0f, 0 0 10px #f0f;
            color: #f0f;
        }

        .btn {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 5px 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 5px #0ff;
            box-shadow: 0 0 5px #0ff inset;
        }
        
        .btn:hover {
            background: #0ff;
            color: #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="hud hud-top" style="flex-direction: column; gap: 10px;">
        <div style="display: flex; justify-content: space-between;">
            <div>SCORE: <span id="scoreDisplay">000000</span></div>
            <div class="text-center retro-text">GIT HISTORY ARCADE</div>
            <div>COMMITS: <span id="commitsDisplay">0</span></div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <div style="color: #0f0; text-shadow: 0 0 5px #0f0;">ACTIVE BRANCHES: <span id="branchesDisplay">0</span></div>
            <div id="vhsDisplay" style="color: #fff; text-shadow: 2px 2px 0 #000, 0 0 10px #fff; font-size: 18px;">
                <span id="playIcon">⏸ PAUSE</span> <span id="dateDisplay">1970/01/01 00:00:00</span>
            </div>
        </div>
    </div>

    <div class="hud hud-bottom flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <select id="repoSelect" class="bg-gray-900 border 2px solid #0ff text-[#0ff] p-2 rounded" style="outline: none; box-shadow: 0 0 5px #0ff;">
                    <option>Loading repos...</option>
                </select>
                <button id="btnPlay" class="btn">PLAY</button>
                <button id="btnPause" class="btn">PAUSE</button>
                <button id="btnReset" class="btn">RESET</button>
            </div>
            <div class="flex items-center gap-2">
                <span>SPEED:</span>
                <input type="range" id="speedSlider" min="1" max="100" value="10" class="w-32">
                <span id="speedDisplay">10x</span>
            </div>
        </div>
        <div class="w-full bg-gray-900 h-2 rounded-full overflow-hidden border border-cyan-900">
            <div id="progressBar" class="bg-cyan-400 h-full w-0 shadow-[0_0_10px_#0ff]"></div>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
